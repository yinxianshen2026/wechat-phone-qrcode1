<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信扫码拨打电话 - 二维码生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .phone-input-wrapper {
            display: flex;
            gap: 10px;
        }

        .phone-input-wrapper select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: #f8f9fa;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .phone-input-wrapper select:focus {
            outline: none;
            border-color: #667eea;
        }

        .phone-input-wrapper input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 18px;
            transition: border-color 0.3s;
            letter-spacing: 1px;
        }

        .phone-input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
        }

        .phone-input-wrapper input::placeholder {
            color: #aaa;
            letter-spacing: 0;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .qrcode-container {
            margin-top: 30px;
            text-align: center;
            display: none;
        }

        .qrcode-container.show {
            display: block;
        }

        .qrcode-wrapper {
            background: white;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #qrcode table {
            border-radius: 10px;
            overflow: hidden;
        }

        .phone-display {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 600;
            color: #333;
            letter-spacing: 2px;
        }

        .tips {
            margin-top: 25px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            border-left: 4px solid #ffc107;
        }

        .tips h3 {
            color: #856404;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .tips ul {
            color: #856404;
            font-size: 12px;
            padding-left: 20px;
        }

        .tips li {
            margin-bottom: 5px;
        }

        .download-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #218838;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 20px;
            }

            .phone-input-wrapper {
                flex-direction: column;
            }

            .phone-input-wrapper select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>微信扫码拨打电话</h1>
            <p>输入电话号码，生成可直接拨打的二维码</p>
        </div>

        <div class="input-group">
            <label for="phone">电话号码</label>
            <div class="phone-input-wrapper">
                <select id="countryCode">
                    <option value="+86">+86 中国</option>
                    <option value="+852">+852 香港</option>
                    <option value="+853">+853 澳门</option>
                    <option value="+886">+886 台湾</option>
                    <option value="+1">+1 美国</option>
                    <option value="+81">+81 日本</option>
                    <option value="+82">+82 韩国</option>
                    <option value="+65">+65 新加坡</option>
                    <option value="+60">+60 马来西亚</option>
                    <option value="+61">+61 澳大利亚</option>
                </select>
                <input type="tel" id="phone" placeholder="请输入电话号码" maxlength="15" autocomplete="off">
            </div>
            <div class="error-message" id="errorMsg">请输入有效的电话号码</div>
        </div>

        <button class="btn" id="generateBtn" onclick="generateQRCode()">生成二维码</button>

        <div class="qrcode-container" id="qrcodeContainer">
            <div class="qrcode-wrapper">
                <div id="qrcode"></div>
            </div>
            <div class="phone-display" id="phoneDisplay"></div>
            <button class="download-btn" onclick="downloadQRCode()">下载二维码</button>
        </div>

        <div class="tips">
            <h3>使用说明</h3>
            <ul>
                <li>输入电话号码后点击"生成二维码"</li>
                <li>使用微信扫描生成的二维码</li>
                <li>微信会打开拨号页面，自动弹出拨号界面</li>
                <li>支持iOS和Android系统</li>
                <li>二维码仅包含电话号码，安全可靠</li>
                <li>注意：需要将call.html和index.html放在同一目录下</li>
            </ul>
        </div>

        <div class="footer">
            本工具仅生成电话拨打二维码，不收集任何个人信息
        </div>
    </div>

    <script>
    var QRCode;
    (function() {
        'use strict';

        var QR8bitByte = function(data) {
            this.mode = 4;
            this.data = data;
        };

        QR8bitByte.prototype = {
            getLength: function() {
                return this.data.length;
            },
            write: function(buffer) {
                for (var i = 0; i < this.data.length; i++) {
                    buffer.put(this.data.charCodeAt(i), 8);
                }
            }
        };

        var QRCodeModel = function(typeNumber, errorCorrectLevel) {
            this.typeNumber = typeNumber;
            this.errorCorrectLevel = errorCorrectLevel;
            this.modules = null;
            this.moduleCount = 0;
            this.dataCache = null;
            this.dataList = [];
        };

        QRCodeModel.prototype = {
            addData: function(data) {
                var newData = new QR8bitByte(data);
                this.dataList.push(newData);
                this.dataCache = null;
            },
            make: function() {
                if (this.typeNumber < 1) {
                    var typeNumber = 1;
                    for (typeNumber = 1; typeNumber < 40; typeNumber++) {
                        var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, this.errorCorrectLevel);
                        var buffer = new QRBitBuffer();
                        var totalDataCount = 0;
                        for (var i = 0; i < rsBlocks.length; i++) {
                            totalDataCount += rsBlocks[i].dataCount;
                        }
                        for (var i = 0; i < this.dataList.length; i++) {
                            var data = this.dataList[i];
                            buffer.put(data.mode, 4);
                            buffer.put(data.getLength(), 8);
                            data.write(buffer);
                        }
                        if (buffer.getLength() <= totalDataCount * 8) break;
                    }
                    this.typeNumber = typeNumber;
                }
                this.makeImpl(false, this.getBestMaskPattern());
            },
            makeImpl: function(test, maskPattern) {
                this.moduleCount = this.typeNumber * 4 + 17;
                this.modules = new Array(this.moduleCount);
                for (var row = 0; row < this.moduleCount; row++) {
                    this.modules[row] = new Array(this.moduleCount);
                    for (var col = 0; col < this.moduleCount; col++) {
                        this.modules[row][col] = null;
                    }
                }
                this.setupPositionProbePattern(0, 0);
                this.setupPositionProbePattern(this.moduleCount - 7, 0);
                this.setupPositionProbePattern(0, this.moduleCount - 7);
                this.setupPositionAdjustPattern();
                this.setupTimingPattern();
                this.setupTypeInfo(test, maskPattern);
                if (this.typeNumber >= 7) {
                    this.setupTypeNumber(test);
                }
                if (this.dataCache == null) {
                    this.dataCache = QRCodeModel.createData(this.typeNumber, this.errorCorrectLevel, this.dataList);
                }
                this.mapData(this.dataCache, maskPattern);
            },
            setupPositionProbePattern: function(row, col) {
                for (var r = -1; r <= 7; r++) {
                    if (row + r <= -1 || this.moduleCount <= row + r) continue;
                    for (var c = -1; c <= 7; c++) {
                        if (col + c <= -1 || this.moduleCount <= col + c) continue;
                        if ((0 <= r && r <= 6 && (c == 0 || c == 6)) ||
                            (0 <= c && c <= 6 && (r == 0 || r == 6)) ||
                            (2 <= r && r <= 4 && 2 <= c && c <= 4)) {
                            this.modules[row + r][col + c] = true;
                        } else {
                            this.modules[row + r][col + c] = false;
                        }
                    }
                }
            },
            getBestMaskPattern: function() {
                var minLostPoint = 0;
                var pattern = 0;
                for (var i = 0; i < 8; i++) {
                    this.makeImpl(true, i);
                    var lostPoint = QRUtil.getLostPoint(this);
                    if (i == 0 || minLostPoint > lostPoint) {
                        minLostPoint = lostPoint;
                        pattern = i;
                    }
                }
                return pattern;
            },
            setupTimingPattern: function() {
                for (var r = 8; r < this.moduleCount - 8; r++) {
                    if (this.modules[r][6] != null) continue;
                    this.modules[r][6] = (r % 2 == 0);
                }
                for (var c = 8; c < this.moduleCount - 8; c++) {
                    if (this.modules[6][c] != null) continue;
                    this.modules[6][c] = (c % 2 == 0);
                }
            },
            setupPositionAdjustPattern: function() {
                var pos = QRUtil.getPatternPosition(this.typeNumber);
                for (var i = 0; i < pos.length; i++) {
                    for (var j = 0; j < pos.length; j++) {
                        var row = pos[i];
                        var col = pos[j];
                        if (this.modules[row][col] != null) continue;
                        for (var r = -2; r <= 2; r++) {
                            for (var c = -2; c <= 2; c++) {
                                if (r == -2 || r == 2 || c == -2 || c == 2 || (r == 0 && c == 0)) {
                                    this.modules[row + r][col + c] = true;
                                } else {
                                    this.modules[row + r][col + c] = false;
                                }
                            }
                        }
                    }
                }
            },
            setupTypeNumber: function(test) {
                var bits = QRUtil.getBCHTypeNumber(this.typeNumber);
                for (var i = 0; i < 18; i++) {
                    var mod = (!test && ((bits >> i) & 1) == 1);
                    this.modules[Math.floor(i / 3)][i % 3 + this.moduleCount - 8 - 3] = mod;
                }
                for (var i = 0; i < 18; i++) {
                    var mod = (!test && ((bits >> i) & 1) == 1);
                    this.modules[i % 3 + this.moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
                }
            },
            setupTypeInfo: function(test, maskPattern) {
                var data = (this.errorCorrectLevel << 3) | maskPattern;
                var bits = QRUtil.getBCHTypeInfo(data);
                for (var i = 0; i < 15; i++) {
                    var mod = (!test && ((bits >> i) & 1) == 1);
                    if (i < 6) {
                        this.modules[i][8] = mod;
                    } else if (i < 8) {
                        this.modules[i + 1][8] = mod;
                    } else {
                        this.modules[this.moduleCount - 15 + i][8] = mod;
                    }
                }
                for (var i = 0; i < 15; i++) {
                    var mod = (!test && ((bits >> i) & 1) == 1);
                    if (i < 8) {
                        this.modules[8][this.moduleCount - i - 1] = mod;
                    } else if (i < 9) {
                        this.modules[8][15 - i - 1 + 1] = mod;
                    } else {
                        this.modules[8][15 - i - 1] = mod;
                    }
                }
                this.modules[this.moduleCount - 8][8] = (!test);
            },
            mapData: function(data, maskPattern) {
                var inc = -1;
                var row = this.moduleCount - 1;
                var bitIndex = 7;
                var byteIndex = 0;
                for (var col = this.moduleCount - 1; col > 0; col -= 2) {
                    if (col == 6) col--;
                    while (true) {
                        for (var c = 0; c < 2; c++) {
                            if (this.modules[row][col - c] == null) {
                                var dark = false;
                                if (byteIndex < data.length) {
                                    dark = (((data[byteIndex] >>> bitIndex) & 1) == 1);
                                }
                                var mask = QRUtil.getMask(maskPattern, row, col - c);
                                if (mask) {
                                    dark = !dark;
                                }
                                this.modules[row][col - c] = dark;
                                bitIndex--;
                                if (bitIndex == -1) {
                                    byteIndex++;
                                    bitIndex = 7;
                                }
                            }
                        }
                        row += inc;
                        if (row < 0 || this.moduleCount <= row) {
                            row -= inc;
                            inc = -inc;
                            break;
                        }
                    }
                }
            },
            isDark: function(row, col) {
                if (row < 0 || this.moduleCount <= row || col < 0 || this.moduleCount <= col) {
                    throw new Error(row + ',' + col);
                }
                return this.modules[row][col];
            },
            getModuleCount: function() {
                return this.moduleCount;
            }
        };

        QRCodeModel.createData = function(typeNumber, errorCorrectLevel, dataList) {
            var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectLevel);
            var buffer = new QRBitBuffer();
            for (var i = 0; i < dataList.length; i++) {
                var data = dataList[i];
                buffer.put(data.mode, 4);
                buffer.put(data.getLength(), 8);
                data.write(buffer);
            }
            var totalDataCount = 0;
            for (var i = 0; i < rsBlocks.length; i++) {
                totalDataCount += rsBlocks[i].dataCount;
            }
            if (buffer.getLengthInBits() > totalDataCount * 8) {
                throw new Error('code length overflow. (' + buffer.getLengthInBits() + '>' + totalDataCount * 8 + ')');
            }
            if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
                buffer.put(0, 4);
            }
            while (buffer.getLengthInBits() % 8 != 0) {
                buffer.putBit(false);
            }
            while (true) {
                if (buffer.getLengthInBits() >= totalDataCount * 8) break;
                buffer.put(0xEC, 8);
                if (buffer.getLengthInBits() >= totalDataCount * 8) break;
                buffer.put(0x11, 8);
            }
            return QRCodeModel.createBytes(buffer, rsBlocks);
        };

        QRCodeModel.createBytes = function(buffer, rsBlocks) {
            var offset = 0;
            var maxDcCount = 0;
            var maxEcCount = 0;
            var dcdata = new Array(rsBlocks.length);
            var ecdata = new Array(rsBlocks.length);
            for (var r = 0; r < rsBlocks.length; r++) {
                var dcCount = rsBlocks[r].dataCount;
                var ecCount = rsBlocks[r].totalCount - dcCount;
                maxDcCount = Math.max(maxDcCount, dcCount);
                maxEcCount = Math.max(maxEcCount, ecCount);
                dcdata[r] = new Array(dcCount);
                for (var i = 0; i < dcdata[r].length; i++) {
                    dcdata[r][i] = 0xff & buffer.buffer[i + offset];
                }
                offset += dcCount;
                var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
                var rawPoly = new QRPolynomial(dcdata[r], rsPoly.getLength() - 1);
                var modPoly = rawPoly.mod(rsPoly);
                ecdata[r] = new Array(rsPoly.getLength() - 1);
                for (var i = 0; i < ecdata[r].length; i++) {
                    var modIndex = i + modPoly.getLength() - ecdata[r].length;
                    ecdata[r][i] = (modIndex >= 0) ? modPoly.get(modIndex) : 0;
                }
            }
            var totalCodeCount = 0;
            for (var i = 0; i < rsBlocks.length; i++) {
                totalCodeCount += rsBlocks[i].totalCount;
            }
            var data = new Array(totalCodeCount);
            var index = 0;
            for (var i = 0; i < maxDcCount; i++) {
                for (var r = 0; r < rsBlocks.length; r++) {
                    if (i < dcdata[r].length) {
                        data[index++] = dcdata[r][i];
                    }
                }
            }
            for (var i = 0; i < maxEcCount; i++) {
                for (var r = 0; r < rsBlocks.length; r++) {
                    if (i < ecdata[r].length) {
                        data[index++] = ecdata[r][i];
                    }
                }
            }
            return data;
        };

        var QRUtil = {
            PATTERN_POSITION_TABLE: [
                [], [6, 18], [6, 22], [6, 26], [6, 30], [6, 34],
                [6, 22, 38], [6, 24, 42], [6, 26, 46], [6, 28, 50], [6, 30, 54],
                [6, 32, 58], [6, 34, 62], [6, 26, 46, 66], [6, 26, 48, 70],
                [6, 26, 50, 74], [6, 30, 54, 78], [6, 30, 56, 82], [6, 30, 58, 86],
                [6, 34, 62, 90], [6, 28, 50, 72, 94], [6, 26, 50, 74, 98],
                [6, 30, 54, 78, 102], [6, 28, 54, 80, 106], [6, 32, 58, 84, 110],
                [6, 30, 58, 86, 114], [6, 34, 62, 90, 118], [6, 26, 50, 74, 98, 122],
                [6, 30, 54, 78, 102, 126], [6, 26, 52, 78, 104, 130],
                [6, 30, 56, 82, 108, 134], [6, 34, 60, 86, 112, 138],
                [6, 30, 58, 86, 114, 142], [6, 34, 62, 90, 118, 146],
                [6, 30, 54, 78, 102, 126, 150], [6, 24, 50, 76, 102, 128, 154],
                [6, 28, 54, 80, 106, 132, 158], [6, 32, 58, 84, 110, 136, 162],
                [6, 26, 54, 82, 110, 138, 166], [6, 30, 58, 86, 114, 142, 170]
            ],
            G15: (1 << 10) | (1 << 8) | (1 << 5) | (1 << 4) | (1 << 2) | (1 << 1) | (1 << 0),
            G18: (1 << 12) | (1 << 11) | (1 << 10) | (1 << 9) | (1 << 8) | (1 << 5) | (1 << 2) | (1 << 0),
            G15_MASK: (1 << 14) | (1 << 12) | (1 << 10) | (1 << 4) | (1 << 1),
            getBCHTypeInfo: function(data) {
                var d = data << 10;
                while (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G15) >= 0) {
                    d ^= (QRUtil.G15 << (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G15)));
                }
                return ((data << 10) | d) ^ QRUtil.G15_MASK;
            },
            getBCHTypeNumber: function(data) {
                var d = data << 12;
                while (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G18) >= 0) {
                    d ^= (QRUtil.G18 << (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G18)));
                }
                return (data << 12) | d;
            },
            getBCHDigit: function(data) {
                var digit = 0;
                while (data != 0) {
                    digit++;
                    data >>>= 1;
                }
                return digit;
            },
            getPatternPosition: function(typeNumber) {
                return QRUtil.PATTERN_POSITION_TABLE[typeNumber - 1];
            },
            getMask: function(maskPattern, i, j) {
                switch (maskPattern) {
                    case 0: return (i + j) % 2 == 0;
                    case 1: return i % 2 == 0;
                    case 2: return j % 3 == 0;
                    case 3: return (i + j) % 3 == 0;
                    case 4: return (Math.floor(i / 2) + Math.floor(j / 3)) % 2 == 0;
                    case 5: return (i * j) % 2 + (i * j) % 3 == 0;
                    case 6: return ((i * j) % 2 + (i * j) % 3) % 2 == 0;
                    case 7: return ((i * j) % 3 + (i + j) % 2) % 2 == 0;
                    default: throw new Error('bad maskPattern:' + maskPattern);
                }
            },
            getErrorCorrectPolynomial: function(errorCorrectLength) {
                var a = new QRPolynomial([1], 0);
                for (var i = 0; i < errorCorrectLength; i++) {
                    a = a.multiply(new QRPolynomial([1, QRMath.gexp(i)], 0));
                }
                return a;
            },
            getLostPoint: function(qrCode) {
                var moduleCount = qrCode.getModuleCount();
                var lostPoint = 0;
                for (var row = 0; row < moduleCount; row++) {
                    for (var col = 0; col < moduleCount; col++) {
                        var sameCount = 0;
                        var dark = qrCode.isDark(row, col);
                        for (var r = -1; r <= 1; r++) {
                            if (row + r < 0 || moduleCount <= row + r) continue;
                            for (var c = -1; c <= 1; c++) {
                                if (col + c < 0 || moduleCount <= col + c) continue;
                                if (r == 0 && c == 0) continue;
                                if (dark == qrCode.isDark(row + r, col + c)) {
                                    sameCount++;
                                }
                            }
                        }
                        if (sameCount > 5) {
                            lostPoint += (3 + sameCount - 5);
                        }
                    }
                }
                for (var row = 0; row < moduleCount - 1; row++) {
                    for (var col = 0; col < moduleCount - 1; col++) {
                        var count = 0;
                        if (qrCode.isDark(row, col)) count++;
                        if (qrCode.isDark(row + 1, col)) count++;
                        if (qrCode.isDark(row, col + 1)) count++;
                        if (qrCode.isDark(row + 1, col + 1)) count++;
                        if (count == 0 || count == 4) {
                            lostPoint += 3;
                        }
                    }
                }
                for (var row = 0; row < moduleCount; row++) {
                    for (var col = 0; col < moduleCount - 6; col++) {
                        if (qrCode.isDark(row, col) && !qrCode.isDark(row, col + 1) &&
                            qrCode.isDark(row, col + 2) && qrCode.isDark(row, col + 3) &&
                            qrCode.isDark(row, col + 4) && !qrCode.isDark(row, col + 5) &&
                            qrCode.isDark(row, col + 6)) {
                            lostPoint += 40;
                        }
                    }
                }
                for (var col = 0; col < moduleCount; col++) {
                    for (var row = 0; row < moduleCount - 6; row++) {
                        if (qrCode.isDark(row, col) && !qrCode.isDark(row + 1, col) &&
                            qrCode.isDark(row + 2, col) && qrCode.isDark(row + 3, col) &&
                            qrCode.isDark(row + 4, col) && !qrCode.isDark(row + 5, col) &&
                            qrCode.isDark(row + 6, col)) {
                            lostPoint += 40;
                        }
                    }
                }
                var darkCount = 0;
                for (var col = 0; col < moduleCount; col++) {
                    for (var row = 0; row < moduleCount; row++) {
                        if (qrCode.isDark(row, col)) {
                            darkCount++;
                        }
                    }
                }
                var ratio = Math.abs(100 * darkCount / moduleCount / moduleCount - 50) / 5;
                lostPoint += ratio * 10;
                return lostPoint;
            }
        };

        var QRMath = {
            glog: function(n) {
                if (n < 1) throw new Error('glog(' + n + ')');
                return QRMath.LOG_TABLE[n];
            },
            gexp: function(n) {
                while (n < 0) n += 255;
                while (n >= 256) n -= 255;
                return QRMath.EXP_TABLE[n];
            },
            EXP_TABLE: new Array(256),
            LOG_TABLE: new Array(256)
        };

        for (var i = 0; i < 8; i++) {
            QRMath.EXP_TABLE[i] = 1 << i;
        }
        for (var i = 8; i < 256; i++) {
            QRMath.EXP_TABLE[i] = QRMath.EXP_TABLE[i - 4] ^ QRMath.EXP_TABLE[i - 5] ^ QRMath.EXP_TABLE[i - 6] ^ QRMath.EXP_TABLE[i - 8];
        }
        for (var i = 0; i < 255; i++) {
            QRMath.LOG_TABLE[QRMath.EXP_TABLE[i]] = i;
        }

        function QRPolynomial(num, shift) {
            if (num.length == undefined) throw new Error(num.length + '/' + shift);
            var offset = 0;
            while (offset < num.length && num[offset] == 0) offset++;
            this.num = new Array(num.length - offset + shift);
            for (var i = 0; i < num.length - offset; i++) {
                this.num[i] = num[i + offset];
            }
        }

        QRPolynomial.prototype = {
            get: function(index) {
                return this.num[index];
            },
            getLength: function() {
                return this.num.length;
            },
            multiply: function(e) {
                var num = new Array(this.getLength() + e.getLength() - 1);
                for (var i = 0; i < this.getLength(); i++) {
                    for (var j = 0; j < e.getLength(); j++) {
                        num[i + j] ^= QRMath.gexp(QRMath.glog(this.get(i)) + QRMath.glog(e.get(j)));
                    }
                }
                return new QRPolynomial(num, 0);
            },
            mod: function(e) {
                if (this.getLength() - e.getLength() < 0) return this;
                var ratio = QRMath.glog(this.get(0)) - QRMath.glog(e.get(0));
                var num = new Array(this.getLength());
                for (var i = 0; i < this.getLength(); i++) {
                    num[i] = this.get(i);
                }
                for (var i = 0; i < e.getLength(); i++) {
                    num[i] ^= QRMath.gexp(QRMath.glog(e.get(i)) + ratio);
                }
                return new QRPolynomial(num, 0).mod(e);
            }
        };

        function QRRSBlock(totalCount, dataCount) {
            this.totalCount = totalCount;
            this.dataCount = dataCount;
        }

        QRRSBlock.RS_BLOCK_TABLE = [
            [1, 26, 19], [1, 26, 16], [1, 26, 13], [1, 26, 9],
            [1, 44, 34], [1, 44, 28], [1, 44, 22], [1, 44, 16],
            [1, 70, 55], [1, 70, 44], [2, 35, 17], [2, 35, 13],
            [1, 100, 80], [2, 50, 32], [2, 50, 24], [4, 25, 9],
            [1, 134, 108], [2, 67, 43], [2, 33, 15, 2, 34, 16], [2, 33, 11, 2, 34, 12],
            [2, 86, 68], [4, 43, 27], [4, 43, 19], [4, 43, 15],
            [2, 98, 78], [4, 49, 31], [2, 32, 14, 4, 33, 15], [4, 39, 13, 1, 40, 14],
            [2, 121, 97], [2, 60, 38, 2, 61, 39], [4, 40, 18, 2, 41, 19], [4, 40, 14, 2, 41, 15],
            [2, 146, 116], [3, 58, 36, 2, 59, 37], [4, 36, 16, 4, 37, 17], [4, 36, 12, 4, 37, 13],
            [2, 86, 68, 2, 87, 69], [4, 69, 43, 1, 70, 44], [6, 43, 19, 2, 44, 20], [6, 43, 15, 2, 44, 16]
        ];

        QRRSBlock.getRSBlocks = function(typeNumber, errorCorrectLevel) {
            var rsBlock = QRRSBlock.getRsBlockTable(typeNumber, errorCorrectLevel);
            if (rsBlock == undefined) {
                throw new Error('bad rs block @ typeNumber:' + typeNumber + '/errorCorrectLevel:' + errorCorrectLevel);
            }
            var length = rsBlock.length / 3;
            var list = [];
            for (var i = 0; i < length; i++) {
                var count = rsBlock[i * 3 + 0];
                var totalCount = rsBlock[i * 3 + 1];
                var dataCount = rsBlock[i * 3 + 2];
                for (var j = 0; j < count; j++) {
                    list.push(new QRRSBlock(totalCount, dataCount));
                }
            }
            return list;
        };

        QRRSBlock.getRsBlockTable = function(typeNumber, errorCorrectLevel) {
            switch (errorCorrectLevel) {
                case 1: return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 0];
                case 0: return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 1];
                case 3: return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 2];
                case 2: return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 3];
                default: return undefined;
            }
        };

        function QRBitBuffer() {
            this.buffer = [];
            this.length = 0;
        }

        QRBitBuffer.prototype = {
            get: function(index) {
                var bufIndex = Math.floor(index / 8);
                return ((this.buffer[bufIndex] >>> (7 - index % 8)) & 1) == 1;
            },
            put: function(num, length) {
                for (var i = 0; i < length; i++) {
                    this.putBit(((num >>> (length - i - 1)) & 1) == 1);
                }
            },
            getLengthInBits: function() {
                return this.length;
            },
            putBit: function(bit) {
                var bufIndex = Math.floor(this.length / 8);
                if (this.buffer.length <= bufIndex) {
                    this.buffer.push(0);
                }
                if (bit) {
                    this.buffer[bufIndex] |= (0x80 >>> (this.length % 8));
                }
                this.length++;
            }
        };

        var QRCodeDrawing = function(htOption) {
            this._htOption = htOption || {};
            this._htOption.typeNumber = this._htOption.typeNumber || 4;
            this._htOption.colorDark = this._htOption.colorDark || '#000000';
            this._htOption.colorLight = this._htOption.colorLight || '#ffffff';
        };

        QRCodeDrawing.prototype.draw = function(text, el) {
            var oQRCode = new QRCodeModel(this._htOption.typeNumber, 0);
            oQRCode.addData(text);
            oQRCode.make();
            this._el = el;
            this._oQRCode = oQRCode;
            this._htOption.width = this._htOption.width || 256;
            this._htOption.height = this._htOption.height || 256;
            var nCount = oQRCode.getModuleCount();
            var nWidth = this._htOption.width / nCount;
            var nHeight = this._htOption.height / nCount;
            var aHTML = ['<table style="border:0;border-collapse:collapse;">'];
            for (var row = 0; row < nCount; row++) {
                aHTML.push('<tr>');
                for (var col = 0; col < nCount; col++) {
                    aHTML.push('<td style="border:0;border-collapse:collapse;padding:0;margin:0;width:' + nWidth + 'px;height:' + nHeight + 'px;background-color:' + (oQRCode.isDark(row, col) ? this._htOption.colorDark : this._htOption.colorLight) + ';"></td>');
                }
                aHTML.push('</tr>');
            }
            aHTML.push('</table>');
            el.innerHTML = aHTML.join('');
        };

        QRCode = function(el, vOption) {
            this._htOption = vOption || {};
            this._el = typeof el === 'string' ? document.getElementById(el) : el;
            this._oDrawing = new QRCodeDrawing(this._htOption);
        };

        QRCode.prototype.makeCode = function(sText) {
            this._oDrawing.draw(sText, this._el);
        };

        QRCode.prototype.clear = function() {
            this._el.innerHTML = '';
        };

        QRCode.CorrectLevel = { L: 1, M: 0, Q: 3, H: 2 };
    })();
    </script>
    <script>
        const phoneInput = document.getElementById('phone');
        const countryCodeSelect = document.getElementById('countryCode');
        const errorMsg = document.getElementById('errorMsg');
        const qrcodeContainer = document.getElementById('qrcodeContainer');
        const qrcodeDiv = document.getElementById('qrcode');
        const phoneDisplay = document.getElementById('phoneDisplay');

        let qrcode = null;

        phoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^\d]/g, '');
            e.target.value = value;
            errorMsg.classList.remove('show');
        });

        phoneInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateQRCode();
            }
        });

        function validatePhone(phone) {
            const phoneRegex = /^\d{6,15}$/;
            return phoneRegex.test(phone);
        }

        function generateQRCode() {
            const phone = phoneInput.value.trim();
            const countryCode = countryCodeSelect.value;

            if (!validatePhone(phone)) {
                errorMsg.classList.add('show');
                phoneInput.focus();
                return;
            }

            const fullPhone = countryCode + phone;
            
            var qrUrl;
            var protocol = window.location.protocol;
            var hostname = window.location.hostname;
            var port = window.location.port;
            
            var baseUrl = protocol + '//' + hostname + (port ? ':' + port : '') + '/';
            qrUrl = baseUrl + 'call.html?phone=' + encodeURIComponent(fullPhone);

            qrcodeDiv.innerHTML = '';

            try {
                qrcode = new QRCode(qrcodeDiv, {
                    width: 256,
                    height: 256,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
                qrcode.makeCode(qrUrl);

                const displayPhone = formatPhoneNumber(fullPhone);
                phoneDisplay.textContent = displayPhone;

                qrcodeContainer.classList.add('show');
                qrcodeContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } catch (err) {
                console.error('Error:', err);
                alert('生成二维码时发生错误：' + (err.message || err));
            }
        }

        function formatPhoneNumber(phone) {
            if (phone.startsWith('+86') && phone.length === 14) {
                return phone.slice(0, 3) + ' ' + phone.slice(3, 6) + ' ' + phone.slice(6, 10) + ' ' + phone.slice(10);
            }
            return phone;
        }

        function downloadQRCode() {
            if (!qrcodeDiv.querySelector('table')) {
                alert('请先生成二维码');
                return;
            }

            try {
                var table = qrcodeDiv.querySelector('table');
                var canvas = document.createElement('canvas');
                var ctx = canvas.getContext('2d');
                
                var cells = table.querySelectorAll('td');
                var size = Math.sqrt(cells.length);
                var scale = 4;
                
                canvas.width = size * scale;
                canvas.height = size * scale;
                
                cells.forEach(function(cell, index) {
                    var row = Math.floor(index / size);
                    var col = index % size;
                    ctx.fillStyle = cell.style.backgroundColor || '#ffffff';
                    ctx.fillRect(col * scale, row * scale, scale, scale);
                });

                var link = document.createElement('a');
                var phone = phoneInput.value.trim();
                var countryCode = countryCodeSelect.value;
                
                link.download = '电话二维码_' + countryCode + phone + '.png';
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                console.error('Download error:', err);
                alert('下载失败：' + (err.message || err));
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            phoneInput.focus();
        });
    </script>
